<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus — Daily Habits & To Do</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0F1117;
    --surface: #16181F;
    --surface2: #1E2029;
    --surface3: #252831;
    --border: #2A2D38;
    --border-light: #33374A;
    --text: #F0F0F2;
    --text-2: #9A9DB0;
    --text-3: #5A5D72;
    --accent: #6366F1;
    --accent-glow: rgba(99,102,241,0.2);
    --green: #22C55E;
    --green-glow: rgba(34,197,94,0.15);
    --red: #EF4444;
    --amber: #F59E0B;
    --radius: 10px;
    --radius-sm: 6px;
  }

  html { font-size: 16px; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app { max-width: 680px; margin: 0 auto; padding: 0 0 80px; min-height: 100vh; }

  /* HEADER */
  .header {
    padding: 20px 20px 0;
    position: sticky; top: 0;
    background: var(--bg);
    z-index: 100;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s;
  }
  .header.scrolled { border-color: var(--border); }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .date-label { font-size: 12px; color: var(--text-3); font-weight: 500; letter-spacing: 0.4px; text-transform: uppercase; }
  .theme-btn {
    width: 32px; height: 32px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-2); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; transition: all 0.15s;
  }
  .theme-btn:hover { background: var(--surface2); color: var(--text); }

  /* TABS */
  .tabs { display: flex; gap: 4px; padding-bottom: 16px; }
  .tab {
    flex: 1; padding: 9px 16px; border: none; border-radius: var(--radius-sm);
    background: transparent; color: var(--text-2);
    font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 7px;
  }
  .tab:hover { background: var(--surface2); color: var(--text); }
  .tab.active { background: var(--surface2); color: var(--text); box-shadow: inset 0 0 0 1px var(--border-light); }
  .tab-badge {
    background: var(--accent); color: #fff;
    font-size: 10px; font-weight: 700; padding: 1px 6px;
    border-radius: 20px; min-width: 18px; text-align: center; line-height: 16px;
  }
  .tab-badge.green { background: var(--green); }

  /* PANELS */
  .panel { display: none; padding: 20px; }
  .panel.active { display: block; }

  /* PROGRESS */
  .progress-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .section-meta { font-size: 11px; color: var(--text-3); font-weight: 500; }
  .progress-pct { font-size: 13px; font-weight: 600; color: var(--accent); }
  .progress-wrap { background: var(--surface2); border-radius: 20px; height: 4px; margin-bottom: 20px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 20px; transition: width 0.4s cubic-bezier(0.34,1.56,0.64,1); }

  /* DAILY TASKS */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .section-title { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text-3); }
  .task-list { display: flex; flex-direction: column; gap: 8px; }

  .daily-task {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; display: flex; align-items: center; gap: 14px;
    cursor: pointer; transition: border-color 0.15s, background 0.15s;
    user-select: none; position: relative;
  }
  .daily-task:hover { border-color: var(--border-light); background: var(--surface2); }
  .daily-task.done { border-color: rgba(34,197,94,0.25); background: linear-gradient(135deg,rgba(34,197,94,0.04) 0%,var(--surface) 100%); }
  .daily-task.done:hover { border-color: rgba(34,197,94,0.4); }

  .task-check {
    width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border-light);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1); background: transparent;
  }
  .daily-task.done .task-check { background: var(--green); border-color: var(--green); transform: scale(1.05); }
  .check-icon { display: none; color: #fff; font-size: 11px; font-weight: 800; }
  .daily-task.done .check-icon { display: block; }

  .task-info { flex: 1; min-width: 0; }
  .task-name { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 2px; display: flex; align-items: center; gap: 8px; }
  .task-emoji { font-size: 15px; }
  .daily-task.done .task-name-text { color: var(--text-2); }

  .task-streak-row { display: flex; align-items: center; gap: 10px; margin-top: 4px; }
  .streak-chip {
    font-size: 11px; font-weight: 600; color: var(--amber);
    background: rgba(245,158,11,0.1); padding: 2px 7px; border-radius: 20px;
    display: flex; align-items: center; gap: 3px; transition: all 0.3s;
  }
  .streak-chip.active { color: var(--green); background: rgba(34,197,94,0.12); }
  .streak-chip.zero { color: var(--text-3); background: var(--surface3); }
  .best-streak { font-size: 11px; color: var(--text-3); }

  @keyframes streakPop {
    0% { transform: scale(1); } 40% { transform: scale(1.35); }
    70% { transform: scale(0.9); } 100% { transform: scale(1); }
  }
  .streak-chip.popping { animation: streakPop 0.4s cubic-bezier(0.34,1.56,0.64,1); }

  .streak-dots { display: flex; gap: 3px; margin-top: 5px; }
  .streak-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .streak-dot.filled { background: var(--green); }
  .streak-dot.today-empty { background: var(--border); border: 1.5px solid var(--border-light); }

  .task-menu-btn {
    width: 28px; height: 28px; border-radius: 6px; border: none;
    background: transparent; color: var(--text-3); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; opacity: 0; transition: opacity 0.15s, background 0.15s; flex-shrink: 0;
  }
  .daily-task:hover .task-menu-btn { opacity: 1; }
  .task-menu-btn:hover { background: var(--surface3); color: var(--text); }

  /* ADD DAILY */
  .add-task-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; border: 1px dashed var(--border); border-radius: var(--radius);
    background: transparent; color: var(--text-3);
    font-family: 'Inter', sans-serif; font-size: 14px;
    cursor: pointer; width: 100%; margin-top: 8px; transition: all 0.15s;
  }
  .add-task-btn:hover { border-color: var(--border-light); color: var(--text-2); background: var(--surface); }

  .inline-add {
    background: var(--surface); border: 1px solid var(--accent); border-radius: var(--radius);
    padding: 12px 14px; margin-top: 8px; display: none; flex-direction: column; gap: 10px;
  }
  .inline-add.visible { display: flex; }
  .inline-add input {
    background: transparent; border: none; color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 500; outline: none; width: 100%;
  }
  .inline-add input::placeholder { color: var(--text-3); }
  .inline-add-row { display: flex; gap: 8px; align-items: center; }
  .emoji-picker-btn {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 10px; color: var(--text-2); font-size: 13px; cursor: pointer;
    font-family: 'Inter', sans-serif; transition: all 0.15s; white-space: nowrap;
  }
  .emoji-picker-btn:hover { background: var(--surface3); }

  .btn-primary {
    background: var(--accent); border: none; border-radius: 6px;
    padding: 7px 14px; color: #fff; font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s;
  }
  .btn-primary:hover { background: #7577F5; }
  .btn-ghost {
    background: transparent; border: none; border-radius: 6px;
    padding: 7px 10px; color: var(--text-3); font-family: 'Inter', sans-serif;
    font-size: 13px; cursor: pointer; transition: all 0.15s;
  }
  .btn-ghost:hover { color: var(--text-2); background: var(--surface2); }

  .emoji-grid { display: grid; grid-template-columns: repeat(8,1fr); gap: 4px; margin-bottom: 12px; }
  .emoji-opt {
    font-size: 18px; padding: 6px; border-radius: 6px; cursor: pointer;
    text-align: center; transition: background 0.1s; border: 1.5px solid transparent;
  }
  .emoji-opt:hover { background: var(--surface3); }
  .emoji-opt.selected { border-color: var(--accent); background: var(--accent-glow); }

  /* ═══════════════════════════════
     TO DO PANEL
  ═══════════════════════════════ */

  /* Category sidebar + content layout */
  .todo-layout { display: flex; gap: 0; min-height: 400px; }

  /* LEFT: category list */
  .cat-sidebar {
    width: 160px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    padding-right: 16px;
    margin-right: 20px;
  }
  .cat-sidebar-title {
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--text-3); margin-bottom: 10px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .cat-list { display: flex; flex-direction: column; gap: 2px; }
  .cat-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; border-radius: var(--radius-sm);
    cursor: pointer; transition: all 0.12s; border: none;
    background: transparent; color: var(--text-2);
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
    width: 100%; text-align: left;
  }
  .cat-item:hover { background: var(--surface2); color: var(--text); }
  .cat-item.active { background: var(--surface2); color: var(--text); box-shadow: inset 0 0 0 1px var(--border-light); }
  .cat-item.active .cat-dot { opacity: 1; }
  .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .cat-count {
    margin-left: auto; font-size: 10px; color: var(--text-3);
    background: var(--surface3); padding: 1px 5px; border-radius: 10px;
    font-weight: 600; min-width: 16px; text-align: center;
  }
  .cat-item.active .cat-count { background: var(--border-light); color: var(--text-2); }

  .add-cat-btn {
    display: flex; align-items: center; gap: 7px;
    padding: 7px 10px; border-radius: var(--radius-sm); cursor: pointer;
    border: 1px dashed var(--border); background: transparent;
    color: var(--text-3); font-family: 'Inter', sans-serif; font-size: 12px;
    width: 100%; margin-top: 8px; transition: all 0.12s;
  }
  .add-cat-btn:hover { border-color: var(--border-light); color: var(--text-2); background: var(--surface); }

  /* RIGHT: task area */
  .todo-content { flex: 1; min-width: 0; }

  /* Fast capture */
  .todo-capture-wrap { position: relative; margin-bottom: 16px; }
  .todo-capture {
    width: 100%; background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 13px 14px 13px 42px;
    color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .todo-capture:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .todo-capture::placeholder { color: var(--text-3); }
  .todo-capture-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-3); font-size: 15px; pointer-events: none; }
  .capture-hint { font-size: 11px; color: var(--text-3); margin-top: 6px; display: flex; align-items: center; gap: 5px; }
  .kbd { background: var(--surface2); border: 1px solid var(--border-light); border-radius: 3px; padding: 1px 5px; font-size: 10px; font-weight: 600; color: var(--text-2); font-family: monospace; }

  /* Current category header */
  .cat-view-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
    padding-bottom: 12px; border-bottom: 1px solid var(--border);
  }
  .cat-view-title { display: flex; align-items: center; gap: 10px; }
  .cat-view-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .cat-view-name { font-size: 16px; font-weight: 600; color: var(--text); }
  .cat-view-count { font-size: 12px; color: var(--text-3); }
  .cat-edit-btn {
    background: transparent; border: none; cursor: pointer;
    color: var(--text-3); font-size: 12px; padding: 4px 8px; border-radius: 5px;
    font-family: 'Inter', sans-serif; transition: all 0.12s;
  }
  .cat-edit-btn:hover { background: var(--surface2); color: var(--text-2); }

  /* Task rows */
  .todo-task {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 10px 12px; display: flex; align-items: center; gap: 10px;
    margin-bottom: 6px; transition: all 0.12s;
    animation: fadeSlideIn 0.18s ease;
  }
  .todo-task:hover { border-color: var(--border-light); background: var(--surface2); }
  .todo-task.completed { opacity: 0.45; }
  .todo-task.completed .todo-task-name { text-decoration: line-through; color: var(--text-3); }

  .todo-check {
    width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--border-light);
    flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; background: transparent;
  }
  .todo-check:hover { border-color: var(--accent); background: var(--accent-glow); }
  .todo-task.completed .todo-check { background: var(--green); border-color: var(--green); }
  .todo-check-icon { display: none; color: #fff; font-size: 10px; font-weight: 800; }
  .todo-task.completed .todo-check-icon { display: block; }

  .todo-task-name {
    flex: 1; font-size: 14px; font-weight: 400; color: var(--text);
    min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* category pill on "All" view */
  .task-cat-pill {
    font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px;
    flex-shrink: 0; white-space: nowrap;
  }

  .todo-task-actions {
    display: flex; gap: 2px; opacity: 0; transition: opacity 0.12s; flex-shrink: 0;
  }
  .todo-task:hover .todo-task-actions { opacity: 1; }
  .action-btn {
    width: 26px; height: 26px; border-radius: 5px; border: none;
    background: transparent; color: var(--text-3); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 12px;
    transition: all 0.12s;
  }
  .action-btn:hover { background: var(--surface3); color: var(--text); }
  .action-btn.danger:hover { background: rgba(239,68,68,0.1); color: var(--red); }

  /* Completed section toggle */
  .completed-toggle {
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    padding: 8px 0; color: var(--text-3); font-size: 12px; font-weight: 500;
    border: none; background: transparent; font-family: 'Inter', sans-serif;
    margin-top: 8px;
  }
  .completed-toggle:hover { color: var(--text-2); }
  .completed-toggle svg { transition: transform 0.2s; }
  .completed-toggle.open svg { transform: rotate(90deg); }

  .clear-done-btn {
    margin-left: auto; font-size: 11px; color: var(--text-3); background: transparent;
    border: none; cursor: pointer; font-family: 'Inter', sans-serif;
    padding: 3px 7px; border-radius: 4px; transition: all 0.15s;
  }
  .clear-done-btn:hover { color: var(--red); background: rgba(239,68,68,0.08); }

  /* search */
  .search-wrap { position: relative; margin-bottom: 14px; }
  .search-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px 8px 34px;
    color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; outline: none;
    transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--border-light); }
  .search-input::placeholder { color: var(--text-3); }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-3); font-size: 12px; pointer-events: none; }

  /* empty state */
  .empty-state { text-align: center; padding: 28px 20px; color: var(--text-3); font-size: 13px; border: 1px dashed var(--border); border-radius: var(--radius-sm); }
  .empty-state-icon { font-size: 24px; margin-bottom: 8px; }

  /* MODAL */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 500; align-items: center; justify-content: center; padding: 20px; }
  .overlay.visible { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border-light); border-radius: 14px; padding: 24px; width: 100%; max-width: 400px; box-shadow: 0 24px 64px rgba(0,0,0,0.6); }
  .modal h3 { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
  .modal input, .modal select {
    width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
    padding: 10px 12px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px;
    outline: none; margin-bottom: 10px; transition: border-color 0.15s;
  }
  .modal input:focus, .modal select:focus { border-color: var(--accent); }
  .modal select { appearance: none; cursor: pointer; }
  .modal-label { font-size: 11px; font-weight: 600; color: var(--text-3); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px; display: block; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .btn-danger { background: rgba(239,68,68,0.1); border: none; border-radius: 6px; padding: 7px 14px; color: var(--red); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; margin-right: auto; }
  .btn-danger:hover { background: rgba(239,68,68,0.2); }

  /* Color swatches */
  .color-swatches { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .color-swatch {
    width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
    border: 2.5px solid transparent; transition: all 0.15s; flex-shrink: 0;
  }
  .color-swatch.selected { border-color: var(--text); transform: scale(1.15); }

  /* Move task dropdown */
  .move-select {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 5px;
    color: var(--text-2); font-family: 'Inter', sans-serif; font-size: 11px;
    padding: 3px 6px; cursor: pointer; outline: none; appearance: none;
  }

  /* LIGHT */
  body.light {
    --bg: #F4F5F7; --surface: #FFFFFF; --surface2: #F0F1F3; --surface3: #E5E7EC;
    --border: #E2E4EA; --border-light: #C8CBD6; --text: #0F1117; --text-2: #4A4D60;
    --text-3: #9A9DB0; --accent: #4F52D9; --accent-glow: rgba(79,82,217,0.12);
  }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2); border: 1px solid var(--border-light);
    color: var(--text); font-size: 13px; font-weight: 500; padding: 10px 18px;
    border-radius: 40px; z-index: 1000;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.visible { transform: translateX(-50%) translateY(0); }

  @keyframes fadeSlideIn { from { opacity:0; transform:translateY(-5px); } to { opacity:1; transform:translateY(0); } }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  @media (max-width: 520px) {
    .cat-sidebar { width: 130px; padding-right: 12px; margin-right: 14px; }
    .cat-item { padding: 6px 8px; font-size: 12px; }
    .panel { padding: 14px; }
    .header { padding: 14px 14px 0; }
    .emoji-grid { grid-template-columns: repeat(6,1fr); }
    .modal { padding: 18px; }
  }
  @media (max-width: 380px) {
    .cat-sidebar { width: 110px; }
    .cat-item span:not(.cat-dot):not(.cat-count) { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 60px; display: inline-block; }
  }
</style>
</head>
<body>
<div class="app" id="app">

  <!-- HEADER -->
  <header class="header" id="header">
    <div class="header-top">
      <div class="logo">focus<span>.</span></div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="date-label" id="dateLabel"></div>
        <button class="theme-btn" id="themeBtn">🌙</button>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" id="tabDaily" onclick="switchTab('daily')">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4h12M2 8h12M2 12h8"/></svg>
        Daily
        <span class="tab-badge green" id="dailyBadge">0</span>
      </button>
      <button class="tab" id="tabTodo" onclick="switchTab('todo')">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 8l2 2 4-4"/></svg>
        To Do
        <span class="tab-badge" id="todoBadge">0</span>
      </button>
    </div>
  </header>

  <!-- DAILY PANEL -->
  <div class="panel active" id="panelDaily">
    <div class="progress-label">
      <span class="section-meta" id="progressText">0 of 0 completed today</span>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <div class="section-header"><div class="section-title">Habits</div></div>
    <div class="task-list" id="dailyTaskList"></div>
    <button class="add-task-btn" onclick="openAddDaily()">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg>
      Add daily habit
    </button>
    <div class="inline-add" id="addDailyForm">
      <div class="inline-add-row">
        <span id="selectedEmoji" style="font-size:20px;cursor:pointer;" onclick="toggleEmojiPicker()">💪</span>
        <input type="text" id="newTaskName" placeholder="Habit name…" maxlength="60" onkeydown="handleAddDailyKey(event)">
      </div>
      <div id="emojiPickerInline" style="display:none;">
        <div class="emoji-grid" id="emojiGrid"></div>
      </div>
      <div class="inline-add-row" style="justify-content:flex-end;">
        <button class="btn-ghost" onclick="cancelAddDaily()">Cancel</button>
        <button class="btn-primary" onclick="confirmAddDaily()">Add Habit</button>
      </div>
    </div>
  </div>

  <!-- TO DO PANEL -->
  <div class="panel" id="panelTodo">

    <!-- Fast capture -->
    <div class="todo-capture-wrap">
      <span class="todo-capture-icon">+</span>
      <input class="todo-capture" id="todoInput" type="text"
        placeholder="Add a task… (goes to selected category)"
        maxlength="200" onkeydown="handleTodoKey(event)" autocomplete="off" spellcheck="false">
    </div>
    <div class="capture-hint">Press <kbd class="kbd">↵ Enter</kbd> to add · <kbd class="kbd">Tab</kbd> to pick category</div>

    <!-- Search -->
    <div class="search-wrap" style="margin-top:14px;">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="searchInput" type="text" placeholder="Search tasks…" oninput="renderTodo()">
    </div>

    <div class="todo-layout">
      <!-- Category sidebar -->
      <div class="cat-sidebar">
        <div class="cat-sidebar-title">
          Lists
        </div>
        <div class="cat-list" id="catList"></div>
        <button class="add-cat-btn" onclick="openAddCat()">
          <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="6" y1="1" x2="6" y2="11"/><line x1="1" y1="6" x2="11" y2="6"/></svg>
          New list
        </button>
      </div>

      <!-- Tasks -->
      <div class="todo-content">
        <div class="cat-view-header" id="catViewHeader"></div>
        <div id="todoActiveList"></div>
        <button class="completed-toggle" id="completedToggle" onclick="toggleCompletedSection()">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 4.5 6 7.5 9 4.5"/></svg>
          <span id="completedToggleLabel">Completed (0)</span>
          <button class="clear-done-btn" onclick="clearCompleted(event)">Clear</button>
        </button>
        <div id="todoCompletedList" style="display:none;"></div>
      </div>
    </div>
  </div>
</div>

<!-- EDIT DAILY MODAL -->
<div class="overlay" id="editDailyModal">
  <div class="modal">
    <h3>Edit Habit</h3>
    <label class="modal-label">Emoji</label>
    <div class="emoji-grid" id="editEmojiGrid" style="margin-bottom:12px;"></div>
    <label class="modal-label">Name</label>
    <input type="text" id="editTaskName" placeholder="Habit name" maxlength="60" onkeydown="if(event.key==='Enter')saveEditDaily()">
    <div class="modal-actions">
      <button class="btn-danger" onclick="deleteDaily()">Delete</button>
      <button class="btn-ghost" onclick="closeModal('editDailyModal')">Cancel</button>
      <button class="btn-primary" onclick="saveEditDaily()">Save</button>
    </div>
  </div>
</div>

<!-- ADD / EDIT CATEGORY MODAL -->
<div class="overlay" id="catModal">
  <div class="modal">
    <h3 id="catModalTitle">New List</h3>
    <label class="modal-label">Name</label>
    <input type="text" id="catModalName" placeholder="e.g. Work, Personal, Shopping…" maxlength="40" onkeydown="if(event.key==='Enter')saveCat()">
    <label class="modal-label">Color</label>
    <div class="color-swatches" id="colorSwatches"></div>
    <div class="modal-actions">
      <button class="btn-danger" id="catDeleteBtn" onclick="deleteCat()" style="display:none;">Delete list</button>
      <button class="btn-ghost" onclick="closeModal('catModal')">Cancel</button>
      <button class="btn-primary" onclick="saveCat()">Save</button>
    </div>
  </div>
</div>

<!-- MOVE TASK MODAL -->
<div class="overlay" id="moveModal">
  <div class="modal">
    <h3>Move to list</h3>
    <div id="moveCatOptions" style="display:flex;flex-direction:column;gap:6px;"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal('moveModal')">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════
const EMOJIS = ['💪','📈','💻','📚','🏃','🧘','🎯','🔥','⚡','🌙','☀️','🥗','💊','🎸','✍️','🎨','🧠','🏋️','🚴','🤸','🏊','🎤','🎯','📝','💰','🧪','🌿','🛌','☕','🍎','🥦','💧'];

const CAT_COLORS = [
  '#6366F1','#8B5CF6','#EC4899','#EF4444','#F59E0B',
  '#10B981','#06B6D4','#3B82F6','#F97316','#84CC16',
  '#A855F7','#14B8A6',
];

// ══════════════════════════════════════════════
// PERSISTENCE
// ══════════════════════════════════════════════
function getToday() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function load(key, def) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; } }
function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

// ── DAILY ──
let dailyTasks = load('focus_daily', [
  { id:'d1', name:'Gym',          emoji:'💪', streak:0, bestStreak:0, history:[], completedToday:false },
  { id:'d2', name:'Trade',        emoji:'📈', streak:0, bestStreak:0, history:[], completedToday:false },
  { id:'d3', name:'Code 1 Hour',  emoji:'💻', streak:0, bestStreak:0, history:[], completedToday:false },
  { id:'d4', name:'Read 10 Pages',emoji:'📚', streak:0, bestStreak:0, history:[], completedToday:false },
  { id:'d5', name:'Protein Goal', emoji:'🥗', streak:0, bestStreak:0, history:[], completedToday:false },
]);

// ── CATEGORIES ──
let categories = load('focus_cats', [
  { id:'cat_all',      name:'All',      color:'#6366F1', protected:true },
  { id:'cat_work',     name:'Work',     color:'#3B82F6' },
  { id:'cat_personal', name:'Personal', color:'#10B981' },
  { id:'cat_errands',  name:'Errands',  color:'#F59E0B' },
]);

// ── TODO TASKS ──
let todoTasks = load('focus_todo', []);

// ── STATE ──
let activeCatId = load('focus_active_cat', 'cat_all');
let showCompleted = false;
let lastResetDate = load('focus_last_reset', '');

function saveDailyTasks() { save('focus_daily', dailyTasks); }
function saveTodoTasks()  { save('focus_todo', todoTasks); }
function saveCats()       { save('focus_cats', categories); }

// ══════════════════════════════════════════════
// MIDNIGHT RESET
// ══════════════════════════════════════════════
function checkMidnightReset() {
  const today = getToday();
  if (lastResetDate !== today) {
    if (lastResetDate) {
      dailyTasks = dailyTasks.map(t => {
        if (!t.completedToday && t.streak > 0) return { ...t, completedToday:false, streak:0 };
        return { ...t, completedToday:false };
      });
      saveDailyTasks();
    }
    lastResetDate = today; save('focus_last_reset', today);
  }
}

// ══════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════
let activeTab = 'daily';
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('panelDaily').classList.toggle('active', tab==='daily');
  document.getElementById('panelTodo').classList.toggle('active', tab==='todo');
  document.getElementById('tabDaily').classList.toggle('active', tab==='daily');
  document.getElementById('tabTodo').classList.toggle('active', tab==='todo');
  if (tab === 'todo') setTimeout(() => document.getElementById('todoInput').focus(), 60);
}

// ══════════════════════════════════════════════
// DAILY TASKS
// ══════════════════════════════════════════════
function renderDaily() {
  const list = document.getElementById('dailyTaskList');
  const today = getToday();
  const sorted = [...dailyTasks].sort((a,b)=>(a.completedToday?1:0)-(b.completedToday?1:0));
  list.innerHTML = '';
  sorted.forEach(t => {
    const el = document.createElement('div');
    el.className = 'daily-task' + (t.completedToday?' done':'');
    el.dataset.id = t.id;
    const last7 = [];
    for (let i=6;i>=0;i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const isToday = ds===today;
      const done = t.history.includes(ds)||(isToday&&t.completedToday);
      last7.push({ds,isToday,done});
    }
    const dotsHtml = last7.map(d=>`<span class="streak-dot${d.done?' filled':(d.isToday?' today-empty':'')}"></span>`).join('');
    const streakClass = t.streak===0?'zero':(t.completedToday?'active':'');
    const streakLabel = t.streak===0?'No streak':`${t.streak} day${t.streak!==1?'s':''}`;
    el.innerHTML = `
      <div class="task-check"><span class="check-icon">✓</span></div>
      <div class="task-info">
        <div class="task-name">
          <span class="task-emoji">${t.emoji}</span>
          <span class="task-name-text">${escHtml(t.name)}</span>
        </div>
        <div class="task-streak-row">
          <span class="streak-chip ${streakClass}" id="streak-${t.id}">🔥 ${streakLabel}</span>
          ${t.bestStreak>0?`<span class="best-streak">Best: ${t.bestStreak}d</span>`:''}
        </div>
        <div class="streak-dots">${dotsHtml}</div>
      </div>
      <button class="task-menu-btn" onclick="openEditDailyModal('${t.id}',event)">•••</button>`;
    el.addEventListener('click', e => { if(e.target.closest('.task-menu-btn')) return; toggleDaily(t.id); });
    list.appendChild(el);
  });
  updateDailyProgress(); updateBadges();
}

function toggleDaily(id) {
  const t = dailyTasks.find(t=>t.id===id); if(!t) return;
  const today = getToday();
  if (!t.completedToday) {
    t.completedToday=true;
    if(!t.history.includes(today)) t.history.push(today);
    t.streak+=1; if(t.streak>t.bestStreak) t.bestStreak=t.streak;
    saveDailyTasks(); renderDaily();
    setTimeout(()=>{ const c=document.getElementById(`streak-${id}`); if(c){c.classList.add('popping'); setTimeout(()=>c.classList.remove('popping'),500);} },60);
    showToast(`🔥 ${t.name} — ${t.streak} day streak!`);
  } else {
    t.completedToday=false;
    const idx=t.history.indexOf(today); if(idx!==-1) t.history.splice(idx,1);
    t.streak=Math.max(0,t.streak-1);
    t.bestStreak=calcBestStreak(t.history);
    saveDailyTasks(); renderDaily();
  }
}

function calcBestStreak(history) {
  if(!history.length) return 0;
  const sorted=[...history].sort(); let best=1,cur=1;
  for(let i=1;i<sorted.length;i++){
    const diff=(new Date(sorted[i])-new Date(sorted[i-1]))/86400000;
    if(diff===1){cur++;if(cur>best)best=cur;} else if(diff>1) cur=1;
  }
  return best;
}

function updateDailyProgress() {
  const total=dailyTasks.length, done=dailyTasks.filter(t=>t.completedToday).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('progressText').textContent=`${done} of ${total} completed today`;
}

// ADD DAILY
let selectedEmoji='💪';
function openAddDaily() {
  document.querySelector('.add-task-btn').style.display='none';
  document.getElementById('addDailyForm').classList.add('visible');
  document.getElementById('newTaskName').focus();
  renderInlineEmojiGrid();
}
function cancelAddDaily() {
  document.getElementById('addDailyForm').classList.remove('visible');
  document.querySelector('.add-task-btn').style.display='';
  document.getElementById('newTaskName').value='';
  document.getElementById('emojiPickerInline').style.display='none';
  selectedEmoji='💪'; document.getElementById('selectedEmoji').textContent=selectedEmoji;
}
function confirmAddDaily() {
  const name=document.getElementById('newTaskName').value.trim(); if(!name){document.getElementById('newTaskName').focus();return;}
  dailyTasks.push({id:'d'+Date.now(),name,emoji:selectedEmoji,streak:0,bestStreak:0,history:[],completedToday:false});
  saveDailyTasks(); cancelAddDaily(); renderDaily(); showToast(`✅ "${name}" added`);
}
function handleAddDailyKey(e) { if(e.key==='Enter') confirmAddDaily(); if(e.key==='Escape') cancelAddDaily(); }
function toggleEmojiPicker() { const p=document.getElementById('emojiPickerInline'); p.style.display=p.style.display==='none'?'block':'none'; }
function renderInlineEmojiGrid() {
  document.getElementById('emojiGrid').innerHTML=EMOJIS.map(e=>`<div class="emoji-opt${e===selectedEmoji?' selected':''}" onclick="pickEmoji('${e}',this)">${e}</div>`).join('');
}
function pickEmoji(emoji,el) {
  selectedEmoji=emoji; document.getElementById('selectedEmoji').textContent=emoji;
  document.querySelectorAll('#emojiGrid .emoji-opt').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected'); document.getElementById('emojiPickerInline').style.display='none';
}

// EDIT DAILY
let editingDailyId=null, editEmoji='💪';
function openEditDailyModal(id,e) {
  e.stopPropagation(); editingDailyId=id;
  const t=dailyTasks.find(t=>t.id===id); if(!t) return;
  editEmoji=t.emoji; document.getElementById('editTaskName').value=t.name;
  renderEditEmojiGrid(); document.getElementById('editDailyModal').classList.add('visible');
  setTimeout(()=>document.getElementById('editTaskName').focus(),100);
}
function renderEditEmojiGrid() {
  document.getElementById('editEmojiGrid').innerHTML=EMOJIS.map(e=>`<div class="emoji-opt${e===editEmoji?' selected':''}" onclick="pickEditEmoji('${e}',this)">${e}</div>`).join('');
}
function pickEditEmoji(emoji,el) { editEmoji=emoji; document.querySelectorAll('#editEmojiGrid .emoji-opt').forEach(e=>e.classList.remove('selected')); el.classList.add('selected'); }
function saveEditDaily() {
  const name=document.getElementById('editTaskName').value.trim(); if(!name) return;
  const t=dailyTasks.find(t=>t.id===editingDailyId); if(t){t.name=name;t.emoji=editEmoji;}
  saveDailyTasks(); renderDaily(); closeModal('editDailyModal');
}
function deleteDaily() {
  dailyTasks=dailyTasks.filter(t=>t.id!==editingDailyId);
  saveDailyTasks(); renderDaily(); closeModal('editDailyModal'); showToast('Habit removed');
}

// ══════════════════════════════════════════════
// TO DO — CATEGORIES
// ══════════════════════════════════════════════
let editingCatId=null, selectedCatColor=CAT_COLORS[0];

function renderCatSidebar() {
  const list=document.getElementById('catList');
  list.innerHTML='';
  categories.forEach(cat => {
    const count = cat.id==='cat_all'
      ? todoTasks.filter(t=>!t.completed).length
      : todoTasks.filter(t=>t.catId===cat.id && !t.completed).length;
    const btn=document.createElement('button');
    btn.className='cat-item'+(activeCatId===cat.id?' active':'');
    btn.innerHTML=`<span class="cat-dot" style="background:${cat.color}"></span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(cat.name)}</span><span class="cat-count">${count}</span>`;
    btn.onclick=()=>{ activeCatId=cat.id; save('focus_active_cat',cat.id); renderCatSidebar(); renderTodo(); };
    if(!cat.protected) {
      btn.ondblclick=(e)=>{ e.stopPropagation(); openEditCat(cat.id); };
    }
    list.appendChild(btn);
  });
}

function openAddCat() {
  editingCatId=null; selectedCatColor=CAT_COLORS[0];
  document.getElementById('catModalTitle').textContent='New List';
  document.getElementById('catModalName').value='';
  document.getElementById('catDeleteBtn').style.display='none';
  renderColorSwatches();
  document.getElementById('catModal').classList.add('visible');
  setTimeout(()=>document.getElementById('catModalName').focus(),100);
}
function openEditCat(id) {
  editingCatId=id;
  const cat=categories.find(c=>c.id===id); if(!cat) return;
  selectedCatColor=cat.color;
  document.getElementById('catModalTitle').textContent='Edit List';
  document.getElementById('catModalName').value=cat.name;
  document.getElementById('catDeleteBtn').style.display='';
  renderColorSwatches();
  document.getElementById('catModal').classList.add('visible');
  setTimeout(()=>document.getElementById('catModalName').focus(),100);
}
function renderColorSwatches() {
  document.getElementById('colorSwatches').innerHTML=CAT_COLORS.map(c=>
    `<div class="color-swatch${c===selectedCatColor?' selected':''}" style="background:${c}" onclick="pickCatColor('${c}',this)"></div>`
  ).join('');
}
function pickCatColor(c,el) {
  selectedCatColor=c;
  document.querySelectorAll('.color-swatch').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
}
function saveCat() {
  const name=document.getElementById('catModalName').value.trim(); if(!name) return;
  if(editingCatId) {
    const cat=categories.find(c=>c.id===editingCatId); if(cat){cat.name=name;cat.color=selectedCatColor;}
  } else {
    const id='cat_'+Date.now();
    categories.push({id,name,color:selectedCatColor});
    activeCatId=id; save('focus_active_cat',id);
  }
  saveCats(); closeModal('catModal'); renderCatSidebar(); renderTodo();
}
function deleteCat() {
  if(!editingCatId) return;
  // Move tasks in this category to "uncategorized" → we'll use cat_all logic (no catId or catId matches)
  todoTasks=todoTasks.map(t=>t.catId===editingCatId?{...t,catId:null}:t);
  categories=categories.filter(c=>c.id!==editingCatId);
  if(activeCatId===editingCatId) activeCatId='cat_all';
  save('focus_active_cat',activeCatId);
  saveCats(); saveTodoTasks(); closeModal('catModal'); renderCatSidebar(); renderTodo();
  showToast('List deleted · tasks moved to All');
}

// ══════════════════════════════════════════════
// TO DO — TASKS
// ══════════════════════════════════════════════
function handleTodoKey(e) {
  if(e.key==='Enter') addTodoTask();
  if(e.key==='Tab') { e.preventDefault(); cycleCatForCapture(); }
}

function addTodoTask() {
  const input=document.getElementById('todoInput');
  const text=input.value.trim(); if(!text) return;
  const catId = activeCatId==='cat_all' ? null : activeCatId;
  todoTasks.unshift({id:'t'+Date.now(),text,catId,completed:false,createdAt:Date.now()});
  saveTodoTasks(); input.value=''; renderCatSidebar(); renderTodo();
}

function cycleCatForCapture() {
  const real=categories.filter(c=>!c.protected);
  if(!real.length) return;
  const idx=real.findIndex(c=>c.id===activeCatId);
  const next=real[(idx+1)%real.length];
  activeCatId=next.id; save('focus_active_cat',next.id);
  renderCatSidebar(); renderTodo();
  document.getElementById('todoInput').placeholder=`Add to "${next.name}"…`;
  setTimeout(()=>document.getElementById('todoInput').placeholder='Add a task… (goes to selected category)',2000);
}

function renderTodo() {
  const search=(document.getElementById('searchInput').value||'').toLowerCase();
  let tasks=todoTasks;
  if(search) tasks=tasks.filter(t=>t.text.toLowerCase().includes(search));
  if(activeCatId!=='cat_all') tasks=tasks.filter(t=>t.catId===activeCatId);

  const active=tasks.filter(t=>!t.completed);
  const done=tasks.filter(t=>t.completed);

  // Header
  const cat=categories.find(c=>c.id===activeCatId)||{name:'All',color:'#6366F1'};
  const isAll=activeCatId==='cat_all';
  document.getElementById('catViewHeader').innerHTML=`
    <div class="cat-view-title">
      <span class="cat-view-dot" style="background:${cat.color}"></span>
      <span class="cat-view-name">${escHtml(cat.name)}</span>
      <span class="cat-view-count">${active.length} task${active.length!==1?'s':''}</span>
    </div>
    ${!isAll?`<button class="cat-edit-btn" onclick="openEditCat('${cat.id}')">Edit list</button>`:''}
  `;

  // Active tasks
  const activeList=document.getElementById('todoActiveList');
  activeList.innerHTML='';
  if(active.length===0) {
    activeList.innerHTML=`<div class="empty-state"><div class="empty-state-icon">✅</div>All clear — nothing here</div>`;
  } else {
    active.forEach(t=>activeList.appendChild(makeTodoEl(t,isAll)));
  }

  // Completed
  document.getElementById('completedToggleLabel').textContent=`Completed (${done.length})`;
  const toggle=document.getElementById('completedToggle');
  toggle.style.display=done.length?'flex':'none';
  const doneList=document.getElementById('todoCompletedList');
  doneList.style.display=showCompleted?'block':'none';
  toggle.classList.toggle('open',showCompleted);
  doneList.innerHTML='';
  if(showCompleted) done.forEach(t=>doneList.appendChild(makeTodoEl(t,isAll)));

  updateBadges();
}

function makeTodoEl(t,showCat) {
  const el=document.createElement('div');
  el.className='todo-task'+(t.completed?' completed':'');
  el.dataset.id=t.id;

  let catPill='';
  if(showCat && t.catId) {
    const c=categories.find(c=>c.id===t.catId);
    if(c) catPill=`<span class="task-cat-pill" style="background:${hexAlpha(c.color,0.15)};color:${c.color}">${escHtml(c.name)}</span>`;
  }

  el.innerHTML=`
    <div class="todo-check" onclick="toggleTodo('${t.id}')"><span class="todo-check-icon">✓</span></div>
    <div class="todo-task-name">${escHtml(t.text)}</div>
    ${catPill}
    <div class="todo-task-actions">
      <button class="action-btn" title="Move to list" onclick="openMoveModal('${t.id}')">📂</button>
      <button class="action-btn danger" onclick="deleteTodo('${t.id}')">🗑</button>
    </div>`;
  return el;
}

function toggleTodo(id) {
  const t=todoTasks.find(t=>t.id===id); if(!t) return;
  t.completed=!t.completed;
  saveTodoTasks(); renderCatSidebar(); renderTodo();
}
function deleteTodo(id) {
  todoTasks=todoTasks.filter(t=>t.id!==id);
  saveTodoTasks(); renderCatSidebar(); renderTodo();
}
function clearCompleted(e) {
  if(e){e.stopPropagation();}
  if(activeCatId==='cat_all') todoTasks=todoTasks.filter(t=>!t.completed);
  else todoTasks=todoTasks.filter(t=>!(t.completed&&t.catId===activeCatId));
  saveTodoTasks(); renderCatSidebar(); renderTodo(); showToast('Completed tasks cleared');
}
function toggleCompletedSection() { showCompleted=!showCompleted; renderTodo(); }

// MOVE TASK MODAL
let movingTaskId=null;
function openMoveModal(id) {
  movingTaskId=id;
  const opts=document.getElementById('moveCatOptions');
  opts.innerHTML='';
  const realCats=categories.filter(c=>!c.protected);
  realCats.forEach(c=>{
    const btn=document.createElement('button');
    btn.style.cssText='display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:Inter,sans-serif;font-size:14px;cursor:pointer;transition:all 0.12s;';
    btn.innerHTML=`<span style="width:10px;height:10px;border-radius:50%;background:${c.color};flex-shrink:0;"></span>${escHtml(c.name)}`;
    btn.onmouseenter=()=>btn.style.borderColor='var(--border-light)';
    btn.onmouseleave=()=>btn.style.borderColor='var(--border)';
    btn.onclick=()=>{ const t=todoTasks.find(t=>t.id===movingTaskId); if(t) t.catId=c.id; saveTodoTasks(); closeModal('moveModal'); renderCatSidebar(); renderTodo(); showToast(`Moved to "${c.name}"`); };
    opts.appendChild(btn);
  });
  if(!realCats.length) opts.innerHTML='<p style="color:var(--text-3);font-size:13px;">No lists yet. Create one first.</p>';
  document.getElementById('moveModal').classList.add('visible');
}

// ══════════════════════════════════════════════
// BADGES
// ══════════════════════════════════════════════
function updateBadges() {
  const done=dailyTasks.filter(t=>t.completedToday).length, total=dailyTasks.length;
  document.getElementById('dailyBadge').textContent=`${done}/${total}`;
  const open=todoTasks.filter(t=>!t.completed).length;
  document.getElementById('todoBadge').textContent=open;
}

// ══════════════════════════════════════════════
// MODAL HELPERS
// ══════════════════════════════════════════════
function closeModal(id) {
  document.getElementById(id).classList.remove('visible');
}
['editDailyModal','catModal','moveModal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)closeModal(id);});
});

// ══════════════════════════════════════════════
// THEME
// ══════════════════════════════════════════════
let isDark=load('focus_theme',true);
function applyTheme() {
  document.body.classList.toggle('light',!isDark);
  document.getElementById('themeBtn').textContent=isDark?'🌙':'☀️';
}
document.getElementById('themeBtn').addEventListener('click',()=>{ isDark=!isDark; save('focus_theme',isDark); applyTheme(); });

// ══════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('visible');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('visible'),2800);
}

// ══════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function hexAlpha(hex,alpha) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function updateDateLabel() {
  const d=new Date(), opts={weekday:'short',month:'short',day:'numeric'};
  document.getElementById('dateLabel').textContent=d.toLocaleDateString('en-US',opts);
}

window.addEventListener('scroll',()=>document.getElementById('header').classList.toggle('scrolled',window.scrollY>10));

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){['editDailyModal','catModal','moveModal'].forEach(closeModal); cancelAddDaily();}
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();switchTab('todo');}
  if((e.metaKey||e.ctrlKey)&&e.key==='d'){e.preventDefault();switchTab('daily');}
});

setInterval(()=>{const p=lastResetDate;checkMidnightReset();if(p!==lastResetDate)renderDaily();},60000);

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
checkMidnightReset();
applyTheme();
updateDateLabel();
renderDaily();
renderCatSidebar();
renderTodo();
</script>
</body>
</html>
